name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/*.exe
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Patch electron-builder pkg unlink bug
        run: |
          node -e "
          const fs = require('fs');
          const pkgFile = 'node_modules/app-builder-lib/out/targets/pkg.js';
          let content = fs.readFileSync(pkgFile, 'utf8');
          const patched = content.replace(
            /await \(0, promises_1\.unlink\)\(this\.outFile\)/g,
            'await (0, promises_1.unlink)(this.outFile).catch(() => {})'
          );
          if (content !== patched) {
            fs.writeFileSync(pkgFile, patched);
            console.log('Patched successfully');
          } else {
            const patched2 = content.replace(
              /unlink\(this\.outFile\)/g,
              'unlink(this.outFile).catch(() => {})'
            );
            fs.writeFileSync(pkgFile, patched2);
            console.log('Applied fallback patch');
          }
          "

      - name: Build macOS PKG
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: release/*.pkg
          if-no-files-found: warn
